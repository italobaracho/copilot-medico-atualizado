version: '3.8'

services:
  backend:
    build:
      context: ./API
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DB_URL=sqlite:///app.db
      - AUTH_SECRET_KEY=chave_secreta_para_desenvolvimento_copilot_medico
      - AUTH_BOOTSTRAP_EMAIL=doctor@example.com
      - AUTH_BOOTSTRAP_PASSWORD=StrongPass123!
      - AUTH_BOOTSTRAP_NAME=Dr. Copilot
      - AUTH_BOOTSTRAP_PROFILES=administrador,medico,recepcao,usuario
      - CORS_ORIGINS=*
      - FLASK_DEBUG=True
    volumes:
      - ./API/backend:/app/backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    depends_on:
      - backend
